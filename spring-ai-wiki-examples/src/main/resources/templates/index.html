<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI Wiki - 智能知识库问答系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 40px; max-width: 800px; width: 100%; }
        h1 { color: #333; text-align: center; margin-bottom: 10px; font-size: 2em; }
        .subtitle { text-align: center; color: #666; margin-bottom: 40px; }
        .features { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .feature-card { background: #f8f9fa; padding: 25px; border-radius: 12px; text-align: center; transition: all 0.3s ease; cursor: pointer; text-decoration: none; color: #333; display: block; }
        .feature-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); background: #fff; }
        .feature-card h3 { margin-bottom: 10px; color: #667eea; }
        .feature-card p { color: #666; font-size: 0.9em; }
        .footer { text-align: center; margin-top: 30px; color: #999; font-size: 0.85em; }
        .qa-box { background: #f8f9fa; padding: 20px; border-radius: 12px; margin-top: 20px; }
        .qa-box textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; min-height: 80px; resize: vertical; font-family: inherit; margin-bottom: 10px; }
        .qa-box button { padding: 12px 25px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .qa-result { margin-top: 15px; padding: 15px; background: #fff; border-radius: 8px; border: 1px solid #eee; min-height: 60px; white-space: pre-wrap; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Spring AI Wiki</h1>
        <p class="subtitle">智能知识库问答系统</p>

        <div class="features">
            <a href="/chat" class="feature-card"><h3>💬 智能对话</h3><p>支持上下文记忆的智能对话系统</p></a>
            <a href="/knowledge" class="feature-card"><h3>📚 知识库</h3><p>添加、管理和检索知识内容</p></a>
            <a href="/map" class="feature-card"><h3>🗺️ 高德地图</h3><p>路线规划、天气查询等 MCP 工具</p></a>
            <div class="feature-card" onclick="document.getElementById('qaArea').scrollIntoView({behavior:'smooth'})"><h3>❓ 知识问答</h3><p>结合知识库的智能问答</p></div>
        </div>

        <div class="qa-box" id="qaArea">
            <h3>💡 快速问答</h3>
            <textarea id="questionInput" placeholder="请输入问题，我会结合知识库回答..."></textarea>
            <button onclick="quickQA()">提问</button>
            <div class="qa-result" id="qaResult" style="display:none;"></div>
        </div>

        <div class="footer"><p>Powered by Spring AI + MiniMax + MongoDB</p></div>
    </div>

    <script>
        async function quickQA() {
            const question = document.getElementById('questionInput').value.trim();
            if (!question) return;

            const resultDiv = document.getElementById('qaResult');
            resultDiv.style.display = 'block';
            resultDiv.textContent = '思考中...';

            try {
                const response = await fetch('/api/knowledge/qa', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        question: encodeURIComponent(question),
                        sessionId: 'default'
                    })
                });
                const result = await response.json();

                if (result.code === 200) {
                    resultDiv.textContent = '回答：\n' + result.data.reply + 
                        '\n\n相关知识条数：' + result.data.knowledgeFound;
                } else {
                    resultDiv.textContent = '错误：' + result.message;
                }
            } catch (err) {
                resultDiv.textContent = '错误：' + err;
            }
        }
    </script>
</body>
</html>
