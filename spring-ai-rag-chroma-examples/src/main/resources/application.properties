# Spring AI Chroma RAG 示例配置
spring.main.web-application-type=none
# Chroma 向量存储配置
# 【关键点】
# 1. 使用本地 Chroma：host=localhost, port=8000
# 2. 使用 Chroma Cloud：host=api.trychroma.com, port=443
spring.ai.vectorstore.chroma.client.host=http://localhost
spring.ai.vectorstore.chroma.client.port=8000

# Chroma 集合配置
# 【关键点】
# 1. collection-name: 集合名称
# 2. initialize-schema: true 自动创建集合
spring.ai.vectorstore.chroma.collection-name=spring-ai-rag-collection
spring.ai.vectorstore.chroma.initialize-schema=true

# 如果使用 Chroma Cloud，需要配置租户和数据库
# spring.ai.vectorstore.chroma.tenant-name=your-tenant-name
# spring.ai.vectorstore.chroma.database-name=your-database-name
# spring.ai.vectorstore.chroma.client.key-token=your-api-key

# MiniMax 模型配置
spring.ai.minimax.api-key=${MINIMAX_API_KEY2}

# 日志配置
logging.level.org.springframework.ai=DEBUG
logging.level.com.example.chroma=DEBUG