# Spring 应用配置
spring.application.name=mcp
spring.main.web-application-type=none

# MCP 客户端配置
# SSE 连接方式：使用 Server-Sent Events 协议连接 MCP 服务器
# spring.ai.mcp.client.sse.connections.server1.url=http://localhost:8080

# Streamable HTTP 连接方式：使用流式 HTTP 协议连接 MCP 服务器
# 【关键点】
# 1. server1 是连接名称，用于标识这个 MCP 服务器
# 2. URL 指向 MCP 服务器的地址
# 3. 支持多个连接配置
spring.ai.mcp.client.streamable-http.connections.server1.url=http://localhost:8080
# spring.ai.mcp.client.streamable-http.connections.server2.url=http://localhost:8081

# 请求超时配置：5 分钟
# 【关键点】
# 1. m 表示分钟
# 2. 可以根据实际需求调整超时时间
spring.ai.mcp.client.request-timeout=5m

# 日志配置
# 【关键点】
# 1. WARN 级别减少日志输出，便于调试
# 2. 可调整为 DEBUG 或 TRACE 级别获取更详细日志
logging.level.io.modelcontextprotocol.client=WARN
logging.level.io.modelcontextprotocol.spec=WARN

# 工具回调配置
# 【关键点】
# 1. 默认为 true，自动将 MCP 工具注册为 Spring AI 工具
# 2. 设置为 false 时需要手动注册工具
# spring.ai.mcp.client.toolcallback.enabled=false

# MiniMax 模型配置
# 【关键点】
# 1. 通过环境变量 MINIMAX_API_KEY 设置 API 密钥
# 2. 也可以直接在这里填写密钥（不推荐，避免泄露）
spring.ai.minimax.api-key=${MINIMAX_API_KEY}
