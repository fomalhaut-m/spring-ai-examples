# MCP 服务器配置

# Web 应用类型配置
# 【关键点】
# 1. 注释掉时默认启用 Web 应用
# 2. 设置为 none 时仅使用 STDIO 传输
# spring.main.web-application-type=none

# Banner 和日志配置（STDIO 传输必需）
# 【关键点】
# 1. 使用 STDIO 传输时必须禁用 Banner 和控制台日志
# 2. 否则会干扰 MCP 协议的通信
# NOTE: You must disable the banner and the console logging 
# to allow the STDIO transport to work !!!
spring.main.banner-mode=off
# logging.pattern.console=

# 传输协议配置
# 【关键点】
# 1. STDIO：通过标准输入输出传输，适用于本地集成
# 2. STREAMABLE：通过流式 HTTP 传输，适用于网络通信
# 3. SSE：通过 Server-Sent Events 传输，适用于实时通信
# spring.ai.mcp.server.stdio=false
spring.ai.mcp.server.protocol=STREAMABLE

# 服务器信息配置
# 【关键点】
# 1. name：服务器名称，用于标识
# 2. version：服务器版本，便于管理
spring.ai.mcp.server.name=my-weather-server
spring.ai.mcp.server.version=0.0.1

# HTTP 服务器端口配置
# 【关键点】
# 1. 默认端口为 8080
# 2. 可以自定义端口
# server.port=8081
