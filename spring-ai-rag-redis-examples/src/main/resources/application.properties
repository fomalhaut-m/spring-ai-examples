# Spring AI Redis RAG 示例配置

# Redis 连接配置
# 【关键点】
# 1. 使用 Redis Stack（支持向量搜索）
# 2. 本地开发使用默认端口 6379
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.data.redis.username=default
# spring.data.redis.password=

# MiniMax 模型配置
# 【关键点】
# 1. 通过环境变量 MINIMAX_API_KEY 设置 API 密钥
# 2. 用于 RAG 中的生成步骤
spring.ai.minimax.api-key=${MINIMAX_API_KEY}

# Redis 向量存储配置
# 【关键点】
# 1. initialize-schema: true 表示自动创建索引
# 2. index-name: 向量索引名称
# 3. prefix: Redis Key 前缀
spring.ai.vectorstore.redis.initialize-schema=true
spring.ai.vectorstore.redis.index-name=spring-ai-rag-index
spring.ai.vectorstore.redis.prefix=rag:

# 日志配置
logging.level.org.springframework.ai=DEBUG
logging.level.com.example.redis=DEBUG